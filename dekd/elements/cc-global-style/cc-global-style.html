<style>
    /* Dek-D CSS */
    .chapter-list-header, .col-chapter-action, .col-chapter-number {
        display: none;
    }
    
    /* My Element */
    div.cc-content-wrapper {
        font-size: 16px;
        font-family: Tahoma;
        color: black;
    }
    /* Glyph, by Harry Roberts | https://css-tricks.com/examples/hrs/ */
    
    div.cc-content-wrapper hr {
        padding: 0;
        border: none;
        border-top: medium double #333;
        color: #333;
        text-align: center;
        margin-top: 30px;
    }
    
    div.cc-content-wrapper hr:after {
        content: attr(data-text);
        display: inline-block;
        position: relative;
        top: -1em;
        font-size: 1.5em;
        padding: 0 0.25em;
        background: #ffffd8;
    }
    
    div.cc-content-wrapper ul,
    div.cc-content-wrapper ol {
        list-style-position: outside;
        margin-left: 30px;
    }
    
    div.cc-content-wrapper ul {
        list-style-type: disc;
    }
    
    div.cc-content-wrapper ol {
        list-style-type: decimal;
    }
</style>
