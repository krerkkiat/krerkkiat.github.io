<link rel="import" href="../bower_components/polymer/polymer.html">

<dom-module id="cc-user">

    <template>
        <style>
        </style>
        <p>cc-user {{userid}}</p>
    </template>
    
    <script>
        Polymer({
            is: "cc-user",
            properties: {
                userid: {
                    type: String,
                    value: "test-init",
                    notify: true,
                    readOnly: true
                }
            },
            ready: function() {
                this.userid = "new-value";
            }
        });
    </script>

</dom-module>
