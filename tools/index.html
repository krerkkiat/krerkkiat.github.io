<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tools</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/15.2.0/react.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/15.2.0/react-dom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-core/5.8.34/browser.min.js"></script>
    <style>
      input#originalUrl {
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="text/babel">
      var YoutubeEmbedParameters = React.createClass({
        getInitialState: function () {
          return {
            originalUrl: '',
            startTimeFlag: true,
            endTimeFlag: false,
            autoplayFlag: false,
            startTime: '0:00',
            endTime: '0:00'
          };
        },
        onOriginalUrlChange: function (e) {
          this.setState({
            originalUrl: e.target.value
          });
        },


        onStartTimeChange: function (e) {
          this.setState({
            startTime: e.target.value
          });
        },
        onEndTimeChange: function (e) {
          this.setState({
            endTime: e.target.value
          });
        },


        onStartTimeFlagChange: function (e) {
          this.setState({
            startTimeFlag: e.target.checked
          });
        },
        onEndTimeFlagChange: function (e) {
          this.setState({
            endTimeFlag: e.target.checked
          });
        },
        onAutoplayTimeFlagChange: function (e) {
          this.setState({
            autoplayFlag: e.target.checked
          });
        },


        render: function () {
          var baseUrl = 'https://www.youtube.com/embed/';

          // Extract the video's ID.
          // https://youtu.be/uuNTO31FlY8
          var videoId = '';
          var pattern = /v=([a-zA-Z0-9_]+)/;

          var res = pattern.exec(this.state.originalUrl);
          if (res && res.length == 2) {
            videoId = res[1];
          }


          // Build the parameter list.
          var parameterList = [];
          var toSeconds = function (stringTime) {
            var seconds = 0;
            var l = stringTime.split(':');
            l.reverse();

            for (var i in l) {
              seconds += l[i] * Math.pow(60, i);
            }

            return seconds;
          }

          if (this.state.startTimeFlag) {
            parameterList.push('start=' + toSeconds(this.state.startTime));
          }

          if (this.state.endTimeFlag) {
            parameterList.push('end=' + toSeconds(this.state.endTime));
          }

          if (this.state.autoplayFlag) {
            parameterList.push('autoplay=1');
          } else {
            parameterList.push('autoplay=0');
          }

          var finalUrl = '';
          if (this.state.originalUrl != '') {
            finalUrl = baseUrl + videoId + '?' + parameterList.join('&') ;
          }

          return (
            <div id="">
              <h3>Youtube's Player with Parameters</h3>
              <div>
                <input type="text"
                  id="originalUrl"
                  onChange={this.onOriginalUrlChange}
                  value={this.state.originalUrl}
                  placeholder="Type or paste the Youtube url here."></input>
                <br/>

                <input type="checkbox"
                  name="parameters"
                  value="startTime"
                  checked={this.state.startTimeFlag}
                  onChange={this.onStartTimeFlagChange}/>Start Time
                <input type="text"
                  onChange={this.onStartTimeChange}
                  value={this.state.startTime}></input>
                <br/>

                <input type="checkbox"
                  name="parameters"
                  value="endTime"
                  checked={this.state.endTimeFlag}
                  onChange={this.onEndTimeFlagChange}/>End Time
                <input type="text"
                  onChange={this.onEndTimeChange}
                  value={this.state.endTime}></input>
                <br/>

                <input type="checkbox"
                  name="parameters"
                  value="autoplay"
                  checked={this.state.autoplayFlag}
                  onChange={this.onAutoplayTimeFlagChange}/>Autoplay
              </div>
              <div>
                <p>{finalUrl}</p>
              </div>
            </div>
          );
        }
      });

      ReactDOM.render(
        <YoutubeEmbedParameters/>,
        document.getElementById('container')
      );
    </script>
  </body>
</html>
